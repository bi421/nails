// MEDIAPIPE WRAPPER — ЗӨВ _analyzeMode ЛОГИК
// ═══════════════════════════════════════════════════════════════════════════
class MediaPipeWrapper {
  constructor() {
    this.hands = null;
    this.pendingResolver = null;
    this._analyzeMode = false;
  }
  
  async initialize() {
    this.hands = new Hands({
      locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
    });
    
    this.hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6,
      selfieMode: false
    });
    
    // ★ ЗАСВАР: ЗӨВ ЛОГИК
    this.hands.onResults((results) => {
      // RAF үед (_analyzeMode = false) → үл тоомсорлох
      if (!this._analyzeMode) return;
      
      // Analyze үед (_analyzeMode = true) → pendingResolver дуудах
      this._analyzeMode = false;
      
      if (this.pendingResolver) {
        const landmarks = results.multiHandLandmarks?.[0] || null;
        const resolve = this.pendingResolver;
        this.pendingResolver = null;
        resolve(landmarks);
      }
    });
    
    await this.hands.initialize();
  }
  
  // RAF loop-д зориулсан
  sendForRaf(image) {
    if (!this.hands) return;
    this.hands.send({ image }).catch(() => {});
  }
  
  // Анализид зориулсан
  async sendAndWait(image) {
    if (!this.hands) return null;
    
    // ★ analyzeMode асаах
    this._analyzeMode = true;
    
    const promise = new Promise((resolve) => {
      this.pendingResolver = resolve;
    });
    
    await this.hands.send({ image }).catch(() => {});
    
    // Timeout хамгаалалт (3 секунд)
    const timeoutPromise = new Promise((resolve) => setTimeout(() => {
      if (this.pendingResolver) {
        this._analyzeMode = false;
        this.pendingResolver = null;
      }
      resolve(null);
    }, 3000));
    
    const result = await Promise.race([promise, timeoutPromise]);
    
    return result;
  }
  
  isReady() {
    return this.hands !== null;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// STABLE HAND IDENTIFIER
// ═══════════════════════════════════════════════════════════════════════════
class StableHandIdentifier {
  constructor() {
    this.deviceId = this.getOrCreateDeviceId();
  }
  
  getOrCreateDeviceId() {
    let id = localStorage.getItem(STORAGE_KEYS.DEVICE_ID);
    if (!id) {
      id = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 8);
      localStorage.setItem(STORAGE_KEYS.DEVICE_ID, id);
    }
    return id;
  }
  
  generateHandId(landmarks) {
    if (!landmarks) return null;
    
    const ratios = this.calculateFingerRatios(landmarks);
    const palmSize = this.calculatePalmSize(landmarks);
    const spacing = this.calculateFingerSpacing(landmarks);
    
    const fuzzyRatios = ratios.map(r => Math.round(r * 100) / 100).join('_');
    const fuzzyPalm = Math.round(palmSize * 100) / 100;
    const fuzzySpacing = Math.round(spacing * 100) / 100;
    
    const combined = `${this.deviceId}_${fuzzyRatios}_${fuzzyPalm}_${fuzzySpacing}`;
    return this.simpleHash(combined);
  }
  
  calculateFingerRatios(landmarks) {
    const fingers = [[8,7], [12,11], [16,15], [20,19]];
    return fingers.map(([tip, dip]) => {
      const t = landmarks[tip], d = landmarks[dip];
      if (!t || !d) return 0;
      return Math.hypot(t.x - d.x, t.y - d.y);
    });
  }
  
  calculatePalmSize(landmarks) {
    const wrist = landmarks[0], middleMcp = landmarks[9];
    if (!wrist || !middleMcp) return 0;
    return Math.hypot(wrist.x - middleMcp.x, wrist.y - middleMcp.y);
  }
  
  calculateFingerSpacing(landmarks) {
    const mcps = [5, 9, 13, 17];
    let total = 0;
    for (let i = 0; i < mcps.length - 1; i++) {
      const a = landmarks[mcps[i]], b = landmarks[mcps[i+1]];
      if (a && b) total += Math.hypot(a.x - b.x, a.y - b.y);
    }
    return total;
  }
  
  simpleHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = ((hash << 5) - hash) + str.charCodeAt(i);
      hash = hash & hash;
    }
    return Math.abs(hash).toString(36);
  }
}

// USER PROFILE MANAGER
// ═══════════════════════════════════════════════════════════════════════════
class UserProfileManager {
  constructor() {
    this.storageKey = STORAGE_KEYS.PROFILES;
    this.maxProfiles = 50;
    this.currentUser = null;
  }
  
  identifyUser(landmarks) {
    const identifier = new StableHandIdentifier();
    const handId = identifier.generateHandId(landmarks);
    
    if (!handId) return { isNewUser: true, profile: this.createNewProfile() };
    
    let profiles = {};
    try {
      const stored = localStorage.getItem(this.storageKey);
      profiles = stored ? JSON.parse(stored) : {};
    } catch (e) { console.warn('Profile уншихад алдаа:', e); }
    
    if (profiles[handId]) {
      this.currentUser = profiles[handId];
      this.currentUser.lastVisit = new Date().toISOString();
      this.currentUser.visitCount++;
      this.saveProfile();
      return { isNewUser: false, profile: this.currentUser };
    } else {
      this.currentUser = this.createNewProfile(handId);
      return { isNewUser: true, profile: this.currentUser };
    }
  }
  
  createNewProfile(handId = null) {
    return {
      userId: handId || 'temp_' + Date.now().toString(36),
      firstVisit: new Date().toISOString(),
      lastVisit: new Date().toISOString(),
      visitCount: 1,
      analysis: null,
      suggestedStyles: [],
      preferences: { favoriteColors: [], favoriteShapes: [], avoidedStyles: [] }
    };
  }
  
  saveAnalysis(analysis) {
    if (!this.currentUser) return false;
    if (!this.currentUser.analysis && analysis) {
      this.currentUser.analysis = { ...analysis, analyzedAt: new Date().toISOString() };
      this.saveProfile();
      return true;
    }
    return false;
  }
  
  suggestNewStyle(newStyle) {
    if (!this.currentUser || !newStyle) return newStyle;
    
    const previousStyles = this.currentUser.suggestedStyles;
    const avoidedStyles = this.currentUser.preferences.avoidedStyles;
    
    const sortedNewColors = (newStyle.colors || []).map(c => c.hex).sort();
    
    const isDuplicate = previousStyles.some(s => {
      const sortedOldColors = (s.colors || []).map(c => c.hex).sort();
      return s.shape === newStyle.shape && 
             JSON.stringify(sortedOldColors) === JSON.stringify(sortedNewColors);
    });
    
    const isAvoided = avoidedStyles.some(a => {
      const sortedAvoidColors = (a.colors || []).map(c => c.hex).sort();
      const matchCount = sortedNewColors.filter(nc => sortedAvoidColors.includes(nc)).length;
      return a.shape === newStyle.shape || matchCount >= 2;
    });
    
    if (isDuplicate || isAvoided) {
      return { ...newStyle, isAlternative: true, message: 'Өмнөхөөс өөр загвар' };
    }
    
    const styleWithId = {
      ...newStyle,
      id: 'style_' + Date.now(),
      suggestedAt: new Date().toISOString(),
      viewed: true,
      liked: null
    };
    
    this.currentUser.suggestedStyles.push(styleWithId);
    this.saveProfile();
    return styleWithId;
  }
  
  rateStyle(styleId, liked) {
    if (!this.currentUser) return;
    
    const style = this.currentUser.suggestedStyles.find(s => s.id === styleId);
    if (style) {
      style.liked = liked;
      
      if (!liked) {
        this.currentUser.preferences.avoidedStyles.push({
          shape: style.shape,
          colors: style.colors || []
        });
      } else {
        if (style.colors) {
          this.currentUser.preferences.favoriteColors.push(...style.colors.map(c => c.hex));
        }
        this.currentUser.preferences.favoriteShapes.push(style.shape);
      }
      this.saveProfile();
    }
  }
  
  saveProfile() {
    if (!this.currentUser?.userId) return;
    try {
      const stored = JSON.parse(localStorage.getItem(this.storageKey) || '{}');
      stored[this.currentUser.userId] = this.currentUser;
      
      const keys = Object.keys(stored);
      if (keys.length > this.maxProfiles) {
        const sorted = keys.sort((a, b) => 
          (stored[a].lastVisit || '').localeCompare(stored[b].lastVisit || '')
        );
        sorted.slice(0, keys.length - this.maxProfiles).forEach(k => delete stored[k]);
      }
      
      localStorage.setItem(this.storageKey, JSON.stringify(stored));
      this.updateStorageInfo();
    } catch (e) { console.warn('Profile хадгалахад алдаа:', e); }
  }
  
  getProfile() { return this.currentUser; }
  hasAnalysis() { return this.currentUser?.analysis !== null; }
  
  clearCurrentProfile() {
    if (!this.currentUser?.userId) return;
    try {
      const stored = JSON.parse(localStorage.getItem(this.storageKey) || '{}');
      delete stored[this.currentUser.userId];
      localStorage.setItem(this.storageKey, JSON.stringify(stored));
      this.currentUser = null;
      this.updateStorageInfo();
    } catch (e) {}
  }
  
  updateStorageInfo() {
    try {
      const stored = localStorage.getItem(this.storageKey);
      const size = stored ? (stored.length / 1024).toFixed(1) : '0';
      const count = stored ? Object.keys(JSON.parse(stored)).length : 0;
      document.getElementById('storageInfo').textContent = `${count} профайл · ${size} KB`;
    } catch (e) {}
  }
}

async function callAISafely(prompt, imageBase64 = null, temperature = 0.8) {
  if (!API_KEY) throw new Error('API Key оруулаагүй байна. ⚙️ тохиргооноос оруулна уу');
  if (!navigator.onLine) throw new Error('Интернет холболт байхгүй байна');
  
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), API_TIMEOUT);
  
  try {
    const parts = [{ text: prompt }];
    if (imageBase64) {
      parts.push({ inline_data: { mime_type: 'image/jpeg', data: imageBase64.split(',')[1] } });
    }
    
    const res = await fetch(`${API_URL}?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller.signal,
      body: JSON.stringify({
        contents: [{ parts }],
        generationConfig: { temperature, maxOutputTokens: 1200, responseMimeType: 'application/json' }
      })
    });
    
    clearTimeout(timeoutId);
    
    if (!res.ok) throw new Error(`API алдаа: ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    
    const rawText = data.candidates[0].content.parts[0].text;
    
    try {
      const match = rawText.match(/\{[\s\S]*\}/);
      if (match) return JSON.parse(match[0]);
      return JSON.parse(rawText);
    } catch (e) {
      console.warn('JSON parse алдаа, raw text ашиглаж байна:', rawText);
      return { raw: rawText };
    }
  } catch (e) {
    clearTimeout(timeoutId);
    if (e.name === 'AbortError') throw new Error('Хугацаа дуусав (15 сек). Дахин оролдоно уу');
    throw e;
  }
}

async function performAIAnalysis(imageBase64) {
  const prompt = `${NAIL_RULE_BASE}\n\n${FEW_SHOT_EXAMPLES}\n\nЭнэ гарын зургийг шинжилж, арьсны өнгө, undertone, хурууны төрлийг тодорхойл. Дээрх дүрмийг баримтлан загвар санал болго.\n\nJSON форматаар хариу өг.`;
  return await callAISafely(prompt, imageBase64, 0.8);
}

async function requestNewStyleFromAI(existingAnalysis, avoidedStyles) {
  const avoidedShapes = avoidedStyles.map(s => s.shape).filter(Boolean);
  const avoidedColors = avoidedStyles.flatMap(s => (s.colors || []).map(c => c.hex));
  
  const prompt = `${NAIL_RULE_BASE}\n\n${FEW_SHOT_EXAMPLES}\n\nШинжилгээ: ${JSON.stringify(existingAnalysis)}\nДургүй хэлбэр: ${avoidedShapes.join(', ') || 'байхгүй'}\nДургүй өнгө: ${avoidedColors.join(', ') || 'байхгүй'}\n\nӨмнөхөөс ӨӨР, ШИНЭ загвар санал болго. JSON форматаар хариу өг.`;
  
  const result = await callAISafely(prompt, null, 0.9);
  return result.style || result;
}

// ═══════════════════════════════════════════════════════════════════════════
// UI FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════════
function showToast(message) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

function updateUserUI() {
  const profile = profileManager.getProfile();
  if (profile) {
    userBadge.textContent = `👤 ${profile.visitCount > 1 ? 'Эргэн ирсэн' : 'Шинэ'}`;
    userInfo.style.display = 'flex';
    visitCountDisplay.textContent = `🔁 ${profile.visitCount}`;
  }
}

function renderReturningUser(lastStyle) {
  const shapeIcons = { almond: '◆', oval: '⬬', round: '○', square: '▯', coffin: '▭', stiletto: '▲' };
  return `
    <div class="returning-message"><span class="icon">👋</span><p>Тавтай морил! Таны өмнөх загвар.</p></div>
    <div class="style-card">
      <div class="style-name">${lastStyle.name || 'Таны загвар'}<span class="style-badge">өмнөх</span></div>
      <div class="shape-section">
        <div class="shape-label">САНАЛ БОЛГОСОН ХЭЛБЭР</div>
        <div class="shape-display"><span class="shape-icon">${shapeIcons[lastStyle.shape] || '⬬'}</span><span class="shape-name">${lastStyle.shape || '-'}</span></div>
        <div class="shape-desc">${lastStyle.shapeDesc || ''}</div>
      </div>
      <div class="colors-section">
        <div class="shape-label">САНАЛ БОЛГОСОН ӨНГӨНҮҮД</div>
        <div class="colors-grid">${(lastStyle.colors || []).map(c => `<div class="color-item"><div class="color-dot" style="background:${c.hex}"></div><div class="color-info"><div class="name">${c.name}</div><div class="hex">${c.hex}</div></div></div>`).join('')}</div>
      </div>
      <div class="reasoning"><p>💬 ${lastStyle.reasoning || ''}</p></div>
    </div>
    <div class="action-row"><div class="action-btn primary" data-action="newStyle">✨ Шинэ загвар хүсэх</div></div>`;
}

function renderNewStyle(style, isAlternative = false) {
  const shapeIcons = { almond: '◆', oval: '⬬', round: '○', square: '▯', coffin: '▭', stiletto: '▲' };
  return `
    ${isAlternative ? '<div class="returning-message"><span class="icon">🔄</span><p>Өмнөхөөс өөр, шинэ загвар!</p></div>' : ''}
    <div class="style-card">
      <div class="style-name">${style.name || 'Таны шинэ загвар'}${isAlternative ? '<span class="style-badge">шинэ</span>' : ''}</div>
      <div class="shape-section">
        <div class="shape-label">САНАЛ БОЛГОСОН ХЭЛБЭР</div>
        <div class="shape-display"><span class="shape-icon">${shapeIcons[style.shape] || '⬬'}</span><span class="shape-name">${style.shape || '-'}</span></div>
        <div class="shape-desc">${style.shapeDesc || ''}</div>
      </div>
      <div class="colors-section">
        <div class="shape-label">САНАЛ БОЛГОСОН ӨНГӨНҮҮД</div>
        <div class="colors-grid">${(style.colors || []).map(c => `<div class="color-item"><div class="color-dot" style="background:${c.hex}"></div><div class="color-info"><div class="name">${c.name}</div><div class="hex">${c.hex}</div></div></div>`).join('')}</div>
      </div>
      ${style.finish ? `<div style="margin:12px 0"><span class="shape-label">ӨНГӨЛГӨӨ</span><div style="color:#a78bfa;font-size:14px;margin-top:4px">${style.finish}</div></div>` : ''}
      <div class="reasoning"><p>💬 ${style.reasoning || ''}</p></div>
      ${style.id ? `<div class="rate-section"><div class="rate-btn like" data-action="rate" data-style-id="${style.id}" data-liked="true">❤️ Таалагдсан</div><div class="rate-btn dislike" data-action="rate" data-style-id="${style.id}" data-liked="false">👎 Дургүй</div></div>` : ''}
    </div>
    <div class="action-row"><div class="action-btn" data-action="reset">📸 Дахин зураг авах</div><div class="action-btn primary" data-action="newStyle">✨ Өөр загвар</div></div>`;
}

// Event delegation
panelContent.addEventListener('click', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;
  if (action === 'rate') {
    profileManager.rateStyle(target.dataset.styleId, target.dataset.liked === 'true');
    showToast(target.dataset.liked === 'true' ? '❤️ Таалагдсан' : '👌 Дургүй');
  } else if (action === 'newStyle') {
    requestNewStyleHandler();
  } else if (action === 'reset') {
    resetAndRetake();
  }
});

async function requestNewStyleHandler() {
  const profile = profileManager.getProfile();
  if (!profile?.analysis) { showToast('Эхлээд зураг аваад шинжилгээ хийнэ үү'); return; }
  
  analyzeBtn.disabled = true;
  panelContent.innerHTML = `<div class="loading"><div class="spinner"></div><p>Шинэ загвар бэлдэж байна...</p></div>`;
  
  try {
    const newStyle = await requestNewStyleFromAI(profile.analysis, profile.preferences.avoidedStyles);
    if (!newStyle) throw new Error('AI загвар үүсгэж чадсангүй');
    
    const suggested = profileManager.suggestNewStyle(newStyle);
    panelContent.innerHTML = renderNewStyle(suggested, suggested.isAlternative);
    if (suggested.isAlternative) showToast('Өмнөхөөс өөр загвар!');
  } catch (e) {
    panelContent.innerHTML = `<p class="ph" style="color:#ff6666">❌ ${e.message}</p>`;
  } finally {
    analyzeBtn.disabled = false;
  }
}

function resetAndRetake() {
  capturedImageData = null;
  panelContent.innerHTML = '<p class="ph">📸 Зураг аваад "Шинжилгээ" дарна уу</p>';
  statusBadge.textContent = '📸 Гараа харуулна уу';
}

// ═══════════════════════════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════════════════════════
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: 1280, height: 720 }
    });
    video.srcObject = stream;
    await video.play();
    
    canvas.width = video.videoWidth || 1280;
    canvas.height = video.videoHeight || 720;
    offscreenCanvas.width = canvas.width;
    offscreenCanvas.height = canvas.height;
    
    statusBadge.textContent = '📸 Камер бэлэн';
  } catch(e) {
    statusBadge.textContent = '❌ Камерын алдаа';
  }
}

function startRafLoop() {
  function loop() {
    if (mpWrapper.isReady() && !isAnalyzing && video.readyState >= 2) {
      mpWrapper.sendForRaf(video);
    }
    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════════════════════════════════════
captureBtn.addEventListener('click', () => {
  offscreenCtx.drawImage(video, 0, 0, offscreenCanvas.width, offscreenCanvas.height);
  capturedImageData = offscreenCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height);
  
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  
  statusBadge.textContent = '📸 Зураг авсан';
  panelContent.innerHTML = '<p class="ph">✨ "Шинжилгээ" дарна уу</p>';
});

analyzeBtn.addEventListener('click', async () => {
  if (!capturedImageData) {
    panelContent.innerHTML = '<p class="ph" style="color:#ffaa55">⚠️ Эхлээд зураг аваарай</p>';
    return;
  }
  
  isAnalyzing = true;
  analyzeBtn.disabled = true;
  captureBtn.disabled = true;
  
  panelContent.innerHTML = `<div class="loading"><div class="spinner"></div><p>Гарыг таньж байна...</p></div>`;
  
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = offscreenCanvas.width;
  tempCanvas.height = offscreenCanvas.height;
  tempCanvas.getContext('2d').putImageData(capturedImageData, 0, 0);
  
  const landmarks = await mpWrapper.sendAndWait(tempCanvas);
  const base64Image = tempCanvas.toDataURL('image/jpeg', 0.85);
  
  const { isNewUser, profile } = profileManager.identifyUser(landmarks);
  updateUserUI();
  
  if (isNewUser) {
    panelContent.innerHTML = `<div class="loading"><div class="spinner"></div><p>Анхны шинжилгээ хийж байна...</p></div>`;
    try {
      const result = await performAIAnalysis(base64Image);
      
      if (result.analysis) {
        profileManager.saveAnalysis(result.analysis);
      }
      
      const style = result.style || result;
      if (!style) throw new Error('AI загвар үүсгэж чадсангүй');
      
      const suggested = profileManager.suggestNewStyle(style);
      panelContent.innerHTML = renderNewStyle(suggested);
      statusBadge.textContent = '✅ Шинжилгээ дууслаа';
      showToast('🎉 Таны гарт тусгайлан зориулсан анхны загвар!');
    } catch (e) {
      panelContent.innerHTML = `<p class="ph" style="color:#ff6666">❌ ${e.message}</p>`;
      statusBadge.textContent = '❌ Алдаа гарлаа';
    }
  } else {
    const previousStyles = profile.suggestedStyles;
    if (previousStyles.length > 0) {
      panelContent.innerHTML = renderReturningUser(previousStyles[previousStyles.length - 1]);
      statusBadge.textContent = '✅ Таны өмнөх загвар';
      showToast(`👋 Тавтай морил! (${profile.visitCount} дахь удаа)`);
    } else {
      panelContent.innerHTML = `<div class="loading"><div class="spinner"></div><p>Шинэ загвар бэлдэж байна...</p></div>`;
      try {
        const result = await performAIAnalysis(base64Image);
        
        if (result.analysis) {
          profileManager.saveAnalysis(result.analysis);
        }
        
        const style = result.style || result;
        if (!style) throw new Error('AI загвар үүсгэж чадсангүй');
        
        const suggested = profileManager.suggestNewStyle(style);
        panelContent.innerHTML = renderNewStyle(suggested);
      } catch (e) {
        panelContent.innerHTML = `<p class="ph" style="color:#ff6666">❌ ${e.message}</p>`;
      }
    }
  }
  
  isAnalyzing = false;
  analyzeBtn.disabled = false;
  captureBtn.disabled = false;
});

// Settings
document.getElementById('settingsToggle').addEventListener('click', () => {
  document.getElementById('settingsPanel').classList.toggle('show');
  profileManager.updateStorageInfo();
});
document.getElementById('clearProfileBtn').addEventListener('click', () => {
  profileManager.clearCurrentProfile();
  userBadge.textContent = '👤 Зочин';
  userInfo.style.display = 'none';
  capturedImageData = null;
  panelContent.innerHTML = '<p class="ph">Профайл устгагдлаа. Шинээр зураг авна уу</p>';
  showToast('🗑️ Профайл устгагдлаа');
  document.getElementById('settingsPanel').classList.remove('show');
});

// ═══════════════════════════════════════════════════════════════════════════
// ЭХЛҮҮЛЭХ
// ═══════════════════════════════════════════════════════════════════════════
(async () => {
  await initCamera();
  await mpWrapper.initialize();
  startRafLoop();
})();
</script>
