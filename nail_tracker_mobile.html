<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💎 Grok Nail AI · Бүрэн ажиллагаатай</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.app{width:100%;max-width:720px;height:100vh;max-height:900px;display:flex;flex-direction:column;background:#0a0a0a;border-radius:24px;overflow:hidden}
.camera-container{position:relative;flex:1;background:#000;overflow:hidden}
video,canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
canvas{z-index:10}
.hud{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;z-index:20;pointer-events:none;gap:8px;flex-wrap:wrap}
.badge{background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);color:#fff;padding:6px 14px;border-radius:30px;font-size:12px;border:1px solid rgba(255,255,255,0.15)}
.badge.ok{color:#88ffaa}
.badge.grok{color:#88ccff;border-color:#4488ff}
.badge.warn{color:#ffaa55}
.controls{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:12px;z-index:20;padding:0 20px}
.btn{background:rgba(30,30,50,0.9);backdrop-filter:blur(8px);color:#fff;border:1px solid #4488ff;padding:14px 28px;border-radius:40px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn.grok{background:linear-gradient(135deg,#1a1a3e,#2a2a5e);border-color:#6688ff}
.btn:active{transform:scale(0.95)}
.btn:disabled{opacity:0.5;pointer-events:none}
.panel{background:#121212;border-top:1px solid #222;padding:16px 20px 24px}
.panel-title{color:#888;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.suggestions{display:flex;gap:10px;flex-wrap:wrap;max-height:120px;overflow-y:auto}
.suggestion{background:#1a1a1a;border:1px solid #333;border-radius:30px;padding:10px 18px;color:#ccc;font-size:13px}
.suggestion.grok-ai{background:#1a1a3e;border-color:#4488ff;color:#aaccff}
.color-swatch{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:8px}
.settings{position:absolute;top:80px;right:16px;z-index:20;background:rgba(10,10,20,0.95);backdrop-filter:blur(8px);padding:16px;border-radius:16px;width:280px;display:none;border:1px solid #334}
.settings.show{display:block}
.settings input,.settings textarea{width:100%;background:#1a1a1a;border:1px solid #334;color:#fff;padding:10px;border-radius:8px;margin:8px 0;font-size:13px}
.settings label{color:#888;font-size:12px}
.settings small{color:#666;font-size:11px;display:block;margin-top:4px}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>
<body>
<div class="app">
  <div class="camera-container">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    
    <div class="hud">
      <span class="badge" id="fpsBadge">-- fps</span>
      <span class="badge warn" id="handBadge">хайж байна...</span>
      <span class="badge grok" id="grokBadge">🤖 Grok бэлэн</span>
    </div>
    
    <div class="controls">
      <button class="btn" id="captureBtn">📸 Зураг авах</button>
      <button class="btn grok" id="analyzeBtn">🤖 Grok шинжилгээ</button>
    </div>
    
    <div class="settings" id="settings">
      <label>🤖 Grok API Key</label>
      <input type="password" id="apiKey" placeholder="gsk_..." value="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">
      <small>Таны API key автоматаар оруулсан</small>
      <label>📝 Prompt (AI заавар)</label>
      <textarea id="prompt">Analyze this hand image carefully. Identify the shape of each fingernail (index, middle, ring, pinky) and recommend the most flattering nail shape (choose from: almond, oval, square, round, coffin, stiletto). Also suggest 3 nail polish colors (as hex codes) that would complement the skin tone. Return ONLY valid JSON in this exact format: {"fingers":{"index":"oval","middle":"almond","ring":"square","pinky":"round"},"colors":["#ff6b9d","#e84393","#c44569"],"reasoning":"Brief explanation of recommendations"}</textarea>
      <button class="btn" id="saveSettings" style="padding:10px;width:100%;margin-top:8px">💾 Хадгалах</button>
    </div>
  </div>
  
  <div class="panel">
    <div class="panel-title">🤖 GROK AI САНАЛ БОЛГОСОН ЗАГВАР</div>
    <div class="suggestions" id="suggestions">
      <span class="suggestion">📸 Зураг аваад "Grok шинжилгээ" дарна</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// GROK NAIL AI - БҮРЭН АЖИЛЛАГААТАЙ
// API Key: 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
// ═══════════════════════════════════════════════════════════════════════════

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fpsBadge = document.getElementById('fpsBadge');
const handBadge = document.getElementById('handBadge');
const grokBadge = document.getElementById('grokBadge');
const suggestionsEl = document.getElementById('suggestions');

// API тохиргоо - ТАНЫ API KEY
let GROK_API_KEY = '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';
let GROK_PROMPT = `Analyze this hand image carefully. Identify the shape of each fingernail (index, middle, ring, pinky) and recommend the most flattering nail shape (choose from: almond, oval, square, round, coffin, stiletto). Also suggest 3 nail polish colors (as hex codes) that would complement the skin tone. Return ONLY valid JSON in this exact format: {"fingers":{"index":"oval","middle":"almond","ring":"square","pinky":"round"},"colors":["#ff6b9d","#e84393","#c44569"],"reasoning":"Brief explanation of recommendations"}`;

let handsModel = null;
let isAnalyzing = false;
let fps = 0, frameCount = 0, lastTime = performance.now();
let capturedImage = null;

// ═══════════════════════════════════════════════════════════════════════════
// GROK API ДУУДАХ
// ═══════════════════════════════════════════════════════════════════════════
async function analyzeWithGrok() {
  grokBadge.textContent = '🤖 Grok шинжилж байна...';
  grokBadge.className = 'badge grok pulse';
  
  try {
    // Одоогийн canvas-аас base64 зураг авах
    const base64Image = canvas.toDataURL('image/jpeg', 0.85);
    const base64Data = base64Image.split(',')[1];
    
    const response = await fetch('https://api.x.ai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GROK_API_KEY}`
      },
      body: JSON.stringify({
        model: 'grok-2-vision-latest',
        messages: [
          {
            role: 'user',
            content: [
              {
                type: 'text',
                text: GROK_PROMPT
              },
              {
                type: 'image_url',
                image_url: {
                  url: `data:image/jpeg;base64,${base64Data}`
                }
              }
            ]
          }
        ],
        max_tokens: 1024,
        temperature: 0.7
      })
    });
    
    const data = await response.json();
    
    if (data.error) {
      throw new Error(data.error.message || 'API алдаа');
    }
    
    const content = data.choices[0].message.content;
    console.log('Grok хариу:', content);
    
    // JSON задлах
    let result;
    try {
      // JSON хэсгийг олж авах
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        result = JSON.parse(jsonMatch[0]);
      } else {
        result = { raw: content };
      }
    } catch (e) {
      console.warn('JSON parse алдаа:', e);
      result = { raw: content };
    }
    
    grokBadge.textContent = '🤖 Grok ✓';
    grokBadge.className = 'badge grok ok';
    
    return result;
    
  } catch (error) {
    console.error('Grok API алдаа:', error);
    grokBadge.textContent = '🤖 Grok алдаа: ' + error.message.substring(0, 20);
    grokBadge.className = 'badge warn';
    return { error: error.message };
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// GROK ҮР ДҮНГ ХАРУУЛАХ
// ═══════════════════════════════════════════════════════════════════════════
function displayGrokResults(result) {
  if (!result) {
    suggestionsEl.innerHTML = '<span class="suggestion">❌ Шинжилгээ амжилтгүй</span>';
    return;
  }
  
  if (result.error) {
    suggestionsEl.innerHTML = `<span class="suggestion">❌ Алдаа: ${result.error}</span>`;
    return;
  }
  
  let html = '';
  
  // Хурууны хэлбэр
  if (result.fingers) {
    const fingerNames = { index: 'Долоовор', middle: 'Дунд', ring: 'Ядам', pinky: 'Чигчий' };
    const shapeNames = { almond: 'Бүйлс', oval: 'Зууван', square: 'Дөрвөлжин', round: 'Дугуй', coffin: 'Coffin', stiletto: 'Stiletto' };
    
    Object.entries(result.fingers).forEach(([finger, shape]) => {
      const fingerName = fingerNames[finger] || finger;
      const shapeName = shapeNames[shape] || shape;
      html += `<span class="suggestion grok-ai">${fingerName}: ${shapeName}</span>`;
    });
  }
  
  // Өнгө
  if (result.colors && Array.isArray(result.colors)) {
    result.colors.forEach(color => {
      html += `<span class="suggestion" style="background:${color}20;border-color:${color}">
        <span class="color-swatch" style="background:${color}"></span>
        ${color}
      </span>`;
    });
  }
  
  // Тайлбар
  if (result.reasoning) {
    html += `<span class="suggestion" style="width:100%">💡 ${result.reasoning}</span>`;
  } else if (result.raw) {
    html += `<span class="suggestion" style="width:100%">📝 ${result.raw.substring(0, 250)}...</span>`;
  }
  
  suggestionsEl.innerHTML = html || '<span class="suggestion">Үр дүн байхгүй</span>';
}

// ═══════════════════════════════════════════════════════════════════════════
// ХУМС ЗУРАХ (MediaPipe)
// ═══════════════════════════════════════════════════════════════════════════
function drawNails(landmarks) {
  const TIPS = [8, 12, 16, 20];
  const DIPS = [7, 11, 15, 19];
  const PIPS = [6, 10, 14, 18];
  const COLORS = ['#ff6b9d', '#e84393', '#c44569', '#fd79a8'];
  
  TIPS.forEach((tipIdx, i) => {
    const tip = landmarks[tipIdx];
    const dip = landmarks[DIPS[i]];
    const pip = landmarks[PIPS[i]];
    
    if (!tip || !dip || !pip) return;
    
    const w = canvas.width, h = canvas.height;
    
    // Байрлал
    const nailX = (tip.x + (dip.x - tip.x) * 0.18) * w;
    const nailY = (tip.y + (dip.y - tip.y) * 0.18) * h;
    
    // Хэмжээ
    const dx = tip.x - pip.x;
    const dy = tip.y - pip.y;
    const len = Math.sqrt(dx*dx + dy*dy) * w * 0.8;
    const nailW = len * 0.55;
    const nailH = len * 0.75;
    
    // Өнцөг
    const angle = Math.atan2(tip.y - pip.y, tip.x - pip.x);
    
    ctx.save();
    ctx.translate(nailX, nailY);
    ctx.rotate(angle);
    
    // Сүүдэр
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 12;
    ctx.shadowOffsetY = 3;
    
    // Хумсны хэлбэр
    ctx.beginPath();
    ctx.ellipse(0, 0, nailW/2, nailH/2, 0, 0, Math.PI * 2);
    
    const grad = ctx.createRadialGradient(-nailW*0.2, -nailH*0.1, nailW*0.1, nailW*0.1, nailH*0.15, nailH*0.6);
    grad.addColorStop(0, COLORS[i]);
    grad.addColorStop(0.6, shadeColor(COLORS[i], -20));
    grad.addColorStop(1, shadeColor(COLORS[i], -40));
    
    ctx.fillStyle = grad;
    ctx.fill();
    
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    
    // Гялбаа
    ctx.beginPath();
    ctx.ellipse(-nailW*0.12, -nailH*0.12, nailW*0.15, nailH*0.16, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fill();
    
    ctx.beginPath();
    ctx.ellipse(nailW*0.08, nailH*0.05, nailW*0.1, nailH*0.12, 0.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fill();
    
    ctx.restore();
  });
}

function shadeColor(color, percent) {
  let R = parseInt(color.substring(1,3), 16);
  let G = parseInt(color.substring(3,5), 16);
  let B = parseInt(color.substring(5,7), 16);
  R = Math.max(0, Math.min(255, R + percent));
  G = Math.max(0, Math.min(255, G + percent));
  B = Math.max(0, Math.min(255, B + percent));
  return `#${((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1)}`;
}

// ═══════════════════════════════════════════════════════════════════════════
// MEDIAPIPE CALLBACK
// ═══════════════════════════════════════════════════════════════════════════
function onResults(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    handBadge.textContent = '✓ гар илэрсэн';
    handBadge.className = 'badge ok';
    drawNails(results.multiHandLandmarks[0]);
  } else {
    handBadge.textContent = 'хайж байна...';
    handBadge.className = 'badge warn';
  }
  
  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastTime >= 200) {
    fps = Math.round(frameCount * 1000 / (now - lastTime));
    fpsBadge.textContent = fps + ' fps';
    frameCount = 0;
    lastTime = now;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// ЭХЛҮҮЛЭХ
// ═══════════════════════════════════════════════════════════════════════════
async function init() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    await video.play();
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const hands = new Hands({
      locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
    });
    
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6,
      selfieMode: true
    });
    
    hands.onResults(onResults);
    await hands.initialize();
    handsModel = hands;
    
    function loop() {
      if (handsModel && video.readyState >= 2) {
        handsModel.send({ image: video }).catch(() => {});
      }
      requestAnimationFrame(loop);
    }
    loop();
    
    handBadge.textContent = 'бэлэн';
    
  } catch (e) {
    console.error(e);
    handBadge.textContent = '❌ камерын алдаа';
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════════════════════════════════════
document.getElementById('captureBtn').addEventListener('click', () => {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  suggestionsEl.innerHTML = '<span class="suggestion">📸 Зураг авсан! Grok шинжилгээ хийхэд бэлэн</span>';
  grokBadge.textContent = '🤖 Grok бэлэн';
});

document.getElementById('analyzeBtn').addEventListener('click', async () => {
  if (isAnalyzing) return;
  
  isAnalyzing = true;
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '🤖 Шинжилж байна...';
  
  try {
    const result = await analyzeWithGrok();
    displayGrokResults(result);
  } finally {
    isAnalyzing = false;
    btn.disabled = false;
    btn.textContent = '🤖 Grok шинжилгээ';
  }
});

// Settings
document.getElementById('apiKey').value = GROK_API_KEY;
document.getElementById('prompt').value = GROK_PROMPT;

document.getElementById('saveSettings').addEventListener('click', () => {
  GROK_API_KEY = document.getElementById('apiKey').value;
  GROK_PROMPT = document.getElementById('prompt').value;
  localStorage.setItem('grok_api_key', GROK_API_KEY);
  localStorage.setItem('grok_prompt', GROK_PROMPT);
  document.getElementById('settings').classList.remove('show');
  grokBadge.textContent = '🤖 Grok ✓';
});

// Settings нээх (Grok badge дээр дарж)
document.getElementById('grokBadge').addEventListener('click', () => {
  document.getElementById('settings').classList.toggle('show');
});

// Эхлүүлэх
init();
</script>
</body>
</html>
