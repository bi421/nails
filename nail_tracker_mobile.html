<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💅 Nail Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,sans-serif}
.container{position:relative;width:100%;max-width:720px;aspect-ratio:4/3;border-radius:20px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,0.6)}
video,canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
video{transform:scaleX(-1)}
canvas{transform:scaleX(-1);z-index:5}
.hud{position:absolute;top:16px;left:16px;z-index:10;display:flex;gap:10px}
.badge{background:rgba(0,0,0,0.6);color:#aaffaa;padding:6px 14px;border-radius:30px;font-size:13px;font-weight:500;backdrop-filter:blur(4px)}
.badge.warn{color:#ffaa88}
.info{position:absolute;bottom:20px;left:20px;right:20px;z-index:10;display:flex;justify-content:center}
.info span{background:rgba(0,0,0,0.5);color:#ccc;padding:8px 20px;border-radius:40px;font-size:14px;backdrop-filter:blur(4px)}
</style>
</head>
<body>
<div class="container">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <div class="hud">
    <span class="badge" id="fps">-- fps</span>
    <span class="badge warn" id="status">ачаалж байна...</span>
  </div>
  <div class="info">
    <span id="nailInfo">💅 Гараа камерт үзүүлнэ үү</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
<script>
const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const fpsEl   = document.getElementById('fps');
const statusEl= document.getElementById('status');
const infoEl  = document.getElementById('nailInfo');

// ── Kalman Filter ──────────────────────────────────────────
class KalmanFilter {
  constructor(q=0.001, r=0.01){ this.q=q; this.r=r; this.p=1; this.k=0; this.x=null; }
  filter(v){ if(this.x===null){this.x=v;return v;} this.p+=this.q; this.k=this.p/(this.p+this.r); this.x+=this.k*(v-this.x); this.p=(1-this.k)*this.p; return this.x; }
  reset(){ this.x=null; this.p=1; }
}

// ── Per-finger filters ─────────────────────────────────────
const filters = {
  index:  { tip:{x:new KalmanFilter(),y:new KalmanFilter()}, dip:{x:new KalmanFilter(),y:new KalmanFilter()} },
  middle: { tip:{x:new KalmanFilter(),y:new KalmanFilter()}, dip:{x:new KalmanFilter(),y:new KalmanFilter()} },
  ring:   { tip:{x:new KalmanFilter(),y:new KalmanFilter()}, dip:{x:new KalmanFilter(),y:new KalmanFilter()} },
  pinky:  { tip:{x:new KalmanFilter(),y:new KalmanFilter()}, dip:{x:new KalmanFilter(),y:new KalmanFilter()} }
};

// ── Landmark indices ───────────────────────────────────────
const FINGERS = {
  index:  { tip:8,  dip:7  },
  middle: { tip:12, dip:11 },
  ring:   { tip:16, dip:15 },
  pinky:  { tip:20, dip:19 }
};

// ── Math ───────────────────────────────────────────────────
function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

function nailParams(tip, dip){
  return {
    x: tip.x + (dip.x-tip.x)*0.18,
    y: tip.y + (dip.y-tip.y)*0.18,
    length: dist(tip,dip)*0.72,
    width:  dist(tip,dip)*0.72*0.58,
    angle:  Math.atan2(dip.y-tip.y, dip.x-tip.x) + Math.PI/2
  };
}

// ── Draw nail ──────────────────────────────────────────────
function drawNail(p, W, H){
  const cx=p.x*W, cy=p.y*H;
  const avg=(W+H)/2;
  const nW=p.width*avg, nL=p.length*avg;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(p.angle);

  ctx.shadowColor='rgba(0,0,0,0.45)';
  ctx.shadowBlur=10;
  ctx.shadowOffsetY=3;

  // nail shape
  ctx.beginPath();
  ctx.ellipse(0, 0, nW/2, nL/2, 0, 0, 2*Math.PI);

  // natural gradient
  const g=ctx.createRadialGradient(-nW*.2,-nL*.1,nW*.1, nW*.1,nL*.15,nL*.7);
  g.addColorStop(0,'#fdf4e8');
  g.addColorStop(0.5,'#ecd9c2');
  g.addColorStop(1,'#d4bda6');
  ctx.fillStyle=g;
  ctx.fill();

  ctx.shadowBlur=0; ctx.shadowOffsetY=0;

  ctx.strokeStyle='#b7a392';
  ctx.lineWidth=1.4;
  ctx.stroke();

  // main shine
  ctx.beginPath();
  ctx.ellipse(-nW*.12,-nL*.15,nW*.15,nL*.18,0,0,2*Math.PI);
  ctx.fillStyle='rgba(255,255,255,0.40)';
  ctx.fill();

  // soft secondary shine
  ctx.beginPath();
  ctx.ellipse(nW*.08,nL*.05,nW*.10,nL*.12,0.2,0,2*Math.PI);
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.fill();

  // free edge
  ctx.beginPath();
  ctx.ellipse(0,nL*.3,nW*.4,nL*.12,0,0,2*Math.PI);
  ctx.fillStyle='rgba(250,240,230,0.42)';
  ctx.fill();

  ctx.restore();
}

// ── Results callback ───────────────────────────────────────
let fps=0, lastTime=performance.now(), frameCount=0;

function onResults(results){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!results.multiHandLandmarks?.length){
    statusEl.textContent='хайж байна...';
    statusEl.className='badge warn';
    infoEl.textContent='💅 Гараа камерт үзүүлнэ үү';
    // reset filters
    Object.values(filters).forEach(f=>{
      f.tip.x.reset();f.tip.y.reset();
      f.dip.x.reset();f.dip.y.reset();
    });
    return;
  }

  statusEl.textContent='✓ илэрсэн';
  statusEl.className='badge';

  const lm=results.multiHandLandmarks[0];
  let count=0;

  Object.entries(FINGERS).forEach(([name,idx])=>{
    const rt=lm[idx.tip], rd=lm[idx.dip];
    if(!rt||!rd) return;
    const f=filters[name];
    const tip={x:f.tip.x.filter(rt.x), y:f.tip.y.filter(rt.y)};
    const dip={x:f.dip.x.filter(rd.x), y:f.dip.y.filter(rd.y)};
    drawNail(nailParams(tip,dip), canvas.width, canvas.height);
    count++;
  });

  infoEl.textContent=`💅 ${count} хурууны хумс`;

  // FPS
  frameCount++;
  const now=performance.now();
  if(now-lastTime>=250){
    fps=Math.round(frameCount*1000/(now-lastTime));
    fpsEl.textContent=fps+' fps';
    frameCount=0; lastTime=now;
  }
}

// ── Init ───────────────────────────────────────────────────
async function start(){
  const stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},
    audio:false
  }).catch(e=>{statusEl.textContent='❌ камерын алдаа';console.error(e);return null;});
  if(!stream) return;

  video.srcObject=stream;
  await new Promise(res=>{video.onloadedmetadata=res;});
  await video.play();
  canvas.width=video.videoWidth||1280;
  canvas.height=video.videoHeight||720;

  statusEl.textContent='ачаалж байна...';

  const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`});
  hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.7,minTrackingConfidence:0.6,selfieMode:true});
  hands.onResults(onResults);
  await hands.initialize();

  statusEl.textContent='хайж байна...';

  (function loop(){
    if(video.readyState>=2) hands.send({image:video}).catch(()=>{});
    requestAnimationFrame(loop);
  })();
}

start();
</script>
</body>
</html>
