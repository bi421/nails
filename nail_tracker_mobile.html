<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💎 Gemini Nail AI · Үнэгүй Vision API</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.app{width:100%;max-width:720px;height:100vh;max-height:900px;display:flex;flex-direction:column;background:#0a0a0a;border-radius:24px;overflow:hidden}
.camera-container{position:relative;flex:1;background:#000;overflow:hidden}
video,canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
canvas{z-index:10}
.hud{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;z-index:20;pointer-events:none;gap:6px;flex-wrap:wrap}
.badge{background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);color:#fff;padding:5px 12px;border-radius:30px;font-size:11px;border:1px solid rgba(255,255,255,0.15)}
.badge.ok{color:#88ffaa}
.badge.gemini{color:#8b5cf6;border-color:#8b5cf6}
.badge.warn{color:#ffaa55}
.controls{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:12px;z-index:20;padding:0 20px}
.btn{background:rgba(30,30,50,0.9);backdrop-filter:blur(8px);color:#fff;border:1px solid #8b5cf6;padding:14px 28px;border-radius:40px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn.gemini{background:linear-gradient(135deg,#1a1a3e,#2d1b4e);border-color:#a78bfa}
.btn:active{transform:scale(0.95)}
.btn:disabled{opacity:0.5;pointer-events:none}
.panel{background:#121212;border-top:1px solid #222;padding:16px 20px 24px}
.panel-title{color:#888;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.suggestions{display:flex;gap:10px;flex-wrap:wrap;max-height:130px;overflow-y:auto}
.suggestion{background:#1a1a1a;border:1px solid #333;border-radius:30px;padding:10px 18px;color:#ccc;font-size:13px}
.suggestion.gemini-ai{background:#1a1a3e;border-color:#8b5cf6;color:#c4b5fd}
.color-swatch{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:8px}
.settings{position:absolute;top:80px;right:16px;z-index:20;background:rgba(10,10,20,0.95);backdrop-filter:blur(8px);padding:16px;border-radius:16px;width:280px;display:none;border:1px solid #8b5cf6}
.settings.show{display:block}
.settings input,.settings textarea{width:100%;background:#1a1a1a;border:1px solid #334;color:#fff;padding:10px;border-radius:8px;margin:8px 0;font-size:13px}
.settings label{color:#888;font-size:12px}
.settings small{color:#666;font-size:10px;display:block;margin-top:4px}
.settings a{color:#8b5cf6;text-decoration:none}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>
<body>
<div class="app">
  <div class="camera-container">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    
    <div class="hud">
      <span class="badge" id="fpsBadge">-- fps</span>
      <span class="badge warn" id="handBadge">хайж байна...</span>
      <span class="badge gemini" id="geminiBadge">🔮 Gemini бэлэн</span>
    </div>
    
    <div class="controls">
      <button class="btn" id="captureBtn">📸 Зураг авах</button>
      <button class="btn gemini" id="analyzeBtn">🔮 Gemini шинжилгээ</button>
    </div>
    
    <div class="settings" id="settings">
      <label>🔮 Gemini API Key</label>
      <input type="password" id="apiKey" placeholder="AIzaSyDCdExkKVn6ZuriCQcE4E1owJ9zi9CZ1yA">
      <small><a href="https://aistudio.google.com/app/apikey" target="_blank">API key авах (үнэгүй)</a></small>
      <label>📝 Prompt</label>
      <textarea id="prompt" rows="6">Analyze this hand image. Identify nail shapes and recommend best nail style for each finger. Return JSON: {"fingers":{"index":"oval","middle":"almond","ring":"square","pinky":"round"},"colors":["#ff6b9d","#e84393","#c44569"],"reasoning":"..."}</textarea>
      <button class="btn" id="saveSettings" style="padding:10px;width:100%;margin-top:8px">💾 Хадгалах</button>
    </div>
  </div>
  
  <div class="panel">
    <div class="panel-title">🔮 GEMINI AI САНАЛ БОЛГОСОН ЗАГВАР</div>
    <div class="suggestions" id="suggestions">
      <span class="suggestion">📸 Зураг аваад "Gemini шинжилгээ" дарна</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// GEMINI NAIL AI - ҮНЭГҮЙ VISION API
// API Key авах: https://aistudio.google.com/app/apikey
// ═══════════════════════════════════════════════════════════════════════════

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fpsBadge = document.getElementById('fpsBadge');
const handBadge = document.getElementById('handBadge');
const geminiBadge = document.getElementById('geminiBadge');
const suggestionsEl = document.getElementById('suggestions');

// API тохиргоо
let GEMINI_API_KEY = localStorage.getItem('AIzaSyDCdExkKVn6ZuriCQcE4E1owJ9zi9CZ1yA') || '';
let GEMINI_PROMPT = localStorage.getItem('gemini_prompt') || 
  `Analyze this hand image carefully. Identify the shape of each fingernail and recommend the most flattering nail shape. Suggest 3 nail polish colors. Return ONLY valid JSON: {"fingers":{"index":"oval","middle":"almond","ring":"square","pinky":"round"},"colors":["#ff6b9d","#e84393","#c44569"],"reasoning":"Brief explanation"}`;

let handsModel = null;
let isAnalyzing = false;
let fps = 0, frameCount = 0, lastTime = performance.now();

// EMA шүүлт
const smoothPos = {
  index: { tip:{x:0,y:0}, dip:{x:0,y:0} },
  middle: { tip:{x:0,y:0}, dip:{x:0,y:0} },
  ring: { tip:{x:0,y:0}, dip:{x:0,y:0} },
  pinky: { tip:{x:0,y:0}, dip:{x:0,y:0} }
};
const ALPHA = 0.35;

// ═══════════════════════════════════════════════════════════════════════════
// GEMINI API ДУУДАХ (ҮНЭГҮЙ)
// ═══════════════════════════════════════════════════════════════════════════
async function analyzeWithGemini() {
  if (!GEMINI_API_KEY) {
    alert('AIzaSyDCdExkKVn6ZuriCQcE4E1owJ9zi9CZ1yA\n\nAPI key авах: https://aistudio.google.com/app/apikey');
    document.getElementById('settings').classList.add('show');
    return null;
  }
  
  geminiBadge.textContent = '🔮 Gemini шинжилж байна...';
  geminiBadge.className = 'badge gemini pulse';
  
  try {
    // Canvas-аас base64 зураг авах
    const base64Image = canvas.toDataURL('image/jpeg', 0.8);
    const base64Data = base64Image.split(',')[1];
    
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: GEMINI_PROMPT },
              {
                inline_data: {
                  mime_type: 'image/jpeg',
                  data: base64Data
                }
              }
            ]
          }],
          generationConfig: {
            temperature: 0.4,
            maxOutputTokens: 1024,
            responseMimeType: 'application/json'
          }
        })
      }
    );
    
    const data = await response.json();
    
    if (data.error) {
      throw new Error(data.error.message);
    }
    
    const text = data.candidates[0].content.parts[0].text;
    console.log('Gemini хариу:', text);
    
    // JSON задлах
    let result;
    try {
      result = JSON.parse(text);
    } catch (e) {
      // JSON биш бол текстийг хадгалах
      result = { raw: text };
    }
    
    geminiBadge.textContent = '🔮 Gemini ✓';
    geminiBadge.className = 'badge gemini ok';
    
    return result;
    
  } catch (error) {
    console.error('Gemini алдаа:', error);
    geminiBadge.textContent = '🔮 Gemini алдаа';
    geminiBadge.className = 'badge warn';
    return { error: error.message };
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// ҮР ДҮН ХАРУУЛАХ
// ═══════════════════════════════════════════════════════════════════════════
function displayResults(result) {
  if (!result) {
    suggestionsEl.innerHTML = '<span class="suggestion">❌ Шинжилгээ амжилтгүй</span>';
    return;
  }
  
  if (result.error) {
    suggestionsEl.innerHTML = `<span class="suggestion">❌ ${result.error}</span>`;
    return;
  }
  
  let html = '';
  const fingerNames = { index: 'Долоовор', middle: 'Дунд', ring: 'Ядам', pinky: 'Чигчий' };
  const shapeNames = { almond: 'Бүйлс', oval: 'Зууван', square: 'Дөрвөлжин', round: 'Дугуй', coffin: 'Coffin', stiletto: 'Stiletto' };
  
  if (result.fingers) {
    Object.entries(result.fingers).forEach(([finger, shape]) => {
      html += `<span class="suggestion gemini-ai">${fingerNames[finger] || finger}: ${shapeNames[shape] || shape}</span>`;
    });
  }
  
  if (result.colors && Array.isArray(result.colors)) {
    result.colors.forEach(color => {
      html += `<span class="suggestion" style="background:${color}20;border-color:${color}">
        <span class="color-swatch" style="background:${color}"></span>${color}
      </span>`;
    });
  }
  
  if (result.reasoning) {
    html += `<span class="suggestion" style="width:100%">💡 ${result.reasoning}</span>`;
  } else if (result.raw) {
    html += `<span class="suggestion" style="width:100%">📝 ${result.raw.substring(0, 200)}...</span>`;
  }
  
  suggestionsEl.innerHTML = html || '<span class="suggestion">Үр дүн байхгүй</span>';
}

// ═══════════════════════════════════════════════════════════════════════════
// ХУМС ЗУРАХ
// ═══════════════════════════════════════════════════════════════════════════
const FINGERS = [
  { name: 'index', tip: 8, dip: 7, pip: 6 },
  { name: 'middle', tip: 12, dip: 11, pip: 10 },
  { name: 'ring', tip: 16, dip: 15, pip: 14 },
  { name: 'pinky', tip: 20, dip: 19, pip: 18 }
];

function drawNails(landmarks) {
  const w = canvas.width, h = canvas.height;
  
  FINGERS.forEach(finger => {
    const tip = landmarks[finger.tip];
    const dip = landmarks[finger.dip];
    const pip = landmarks[finger.pip];
    
    if (!tip || !dip || !pip) return;
    
    const buf = smoothPos[finger.name];
    buf.tip.x = buf.tip.x * ALPHA + tip.x * (1 - ALPHA);
    buf.tip.y = buf.tip.y * ALPHA + tip.y * (1 - ALPHA);
    buf.dip.x = buf.dip.x * ALPHA + dip.x * (1 - ALPHA);
    buf.dip.y = buf.dip.y * ALPHA + dip.y * (1 - ALPHA);
    
    const sTip = buf.tip;
    const sDip = buf.dip;
    
    const dx = sDip.x - sTip.x;
    const dy = sDip.y - sTip.y;
    const fingerLen = Math.sqrt(dx*dx + dy*dy);
    
    const baseX = sTip.x + dx * 0.25;
    const baseY = sTip.y + dy * 0.25;
    const nailLen = fingerLen * 0.65;
    const centerX = baseX + dx * 0.40;
    const centerY = baseY + dy * 0.40;
    const nailWid = nailLen * 0.58;
    
    const canvasX = centerX * w;
    const canvasY = centerY * h;
    const pixelLen = nailLen * ((w + h) / 2);
    const pixelWid = nailWid * ((w + h) / 2);
    const angle = Math.atan2(sTip.y - pip.y, sTip.x - pip.x);
    
    ctx.save();
    ctx.translate(canvasX, canvasY);
    ctx.rotate(angle);
    
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 12;
    ctx.shadowOffsetY = 3;
    
    ctx.beginPath();
    ctx.ellipse(0, 0, pixelWid/2, pixelLen/2, 0, 0, Math.PI * 2);
    
    const grad = ctx.createRadialGradient(-pixelWid*0.2, -pixelLen*0.1, pixelWid*0.1, pixelWid*0.1, pixelLen*0.15, pixelLen*0.6);
    grad.addColorStop(0, '#fdf4e8');
    grad.addColorStop(0.4, '#ecd9c2');
    grad.addColorStop(1, '#d4bda6');
    
    ctx.fillStyle = grad;
    ctx.fill();
    
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    ctx.strokeStyle = '#b7a392';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    
    ctx.beginPath();
    ctx.ellipse(-pixelWid*0.12, -pixelLen*0.12, pixelWid*0.15, pixelLen*0.16, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();
    
    ctx.restore();
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// MEDIAPIPE
// ═══════════════════════════════════════════════════════════════════════════
function onResults(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    handBadge.textContent = '✓ гар илэрсэн';
    handBadge.className = 'badge ok';
    drawNails(results.multiHandLandmarks[0]);
  } else {
    handBadge.textContent = 'хайж байна...';
    handBadge.className = 'badge warn';
  }
  
  frameCount++;
  const now = performance.now();
  if (now - lastTime >= 200) {
    fps = Math.round(frameCount * 1000 / (now - lastTime));
    fpsBadge.textContent = fps + ' fps';
    frameCount = 0;
    lastTime = now;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// ЭХЛҮҮЛЭХ
// ═══════════════════════════════════════════════════════════════════════════
async function init() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    await video.play();
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const hands = new Hands({
      locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
    });
    
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6,
      selfieMode: true
    });
    
    hands.onResults(onResults);
    await hands.initialize();
    handsModel = hands;
    
    function loop() {
      if (handsModel && video.readyState >= 2) {
        handsModel.send({ image: video }).catch(() => {});
      }
      requestAnimationFrame(loop);
    }
    loop();
    
  } catch (e) {
    console.error(e);
    handBadge.textContent = '❌ камерын алдаа';
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════════════════════════════════════
document.getElementById('captureBtn').addEventListener('click', () => {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  suggestionsEl.innerHTML = '<span class="suggestion">📸 Зураг авсан! Gemini шинжилгээ хийхэд бэлэн</span>';
});

document.getElementById('analyzeBtn').addEventListener('click', async () => {
  if (isAnalyzing) return;
  isAnalyzing = true;
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '🔮 Шинжилж байна...';
  
  try {
    const result = await analyzeWithGemini();
    displayResults(result);
  } finally {
    isAnalyzing = false;
    btn.disabled = false;
    btn.textContent = '🔮 Gemini шинжилгээ';
  }
});

document.getElementById('apiKey').value = GEMINI_API_KEY;
document.getElementById('prompt').value = GEMINI_PROMPT;

document.getElementById('saveSettings').addEventListener('click', () => {
  GEMINI_API_KEY = document.getElementById('apiKey').value;
  GEMINI_PROMPT = document.getElementById('prompt').value;
  localStorage.setItem('gemini_api_key', GEMINI_API_KEY);
  localStorage.setItem('gemini_prompt', GEMINI_PROMPT);
  document.getElementById('settings').classList.remove('show');
  geminiBadge.textContent = '🔮 Gemini ✓';
});

document.getElementById('geminiBadge').addEventListener('click', () => {
  document.getElementById('settings').classList.toggle('show');
});

init();
</script>
</body>
</html>
