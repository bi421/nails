<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💅 Nail Detector v17.0 - Бодит Туршилт</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: #1a1a2e;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    h1 {
      color: #fff;
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
      font-weight: 500;
    }
    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    video {
      transform: scaleX(-1); /* Selfie mirror effect */
    }
    canvas {
      transform: scaleX(-1); /* Canvas-ыг мөн mirror */
      pointer-events: none;
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    button {
      flex: 1;
      background: #4a4a8a;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button.primary {
      background: #8b5cf6;
    }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.5; pointer-events: none; }
    .status {
      background: #0d0d1a;
      padding: 12px 16px;
      border-radius: 12px;
      color: #a78bfa;
      font-size: 14px;
      margin-bottom: 12px;
      min-height: 48px;
    }
    .stats {
      display: flex;
      gap: 12px;
      justify-content: space-around;
      color: #888;
      font-size: 13px;
    }
    .stats span { color: #a78bfa; font-weight: 600; }
  </style>
</head>
<body>
<div class="container">
  <h1>💅 Nail Detector v17.0</h1>
  
  <div class="video-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>
  
  <div class="controls">
    <button id="startBtn">▶️ Start</button>
    <button id="stopBtn" disabled>⏹️ Stop</button>
    <button id="captureBtn" disabled>📸 Capture</button>
  </div>
  
  <div class="status" id="status">
    Ready. Click "Start" to begin.
  </div>
  
  <div class="stats">
    <div>🎯 FPS: <span id="fps">--</span></div>
    <div>💅 Nails: <span id="nailCount">--</span></div>
    <div>📐 Angle: <span id="angle">--</span></div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "advanced-nail-detector": "./advanced-nail-detector.js"
    }
  }
</script>

<script type="module">
  import { AdvancedNailDetector } from './advanced-nail-detector.js';

  // DOM Elements
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const captureBtn = document.getElementById('captureBtn');
  const statusEl = document.getElementById('status');
  const fpsEl = document.getElementById('fps');
  const nailCountEl = document.getElementById('nailCount');
  const angleEl = document.getElementById('angle');

  // Detector instance
  const detector = new AdvancedNailDetector({
    DEBUG: true,
    MEDIAPIPE: { selfieMode: true }
  });

  // State
  let isRunning = false;
  let fps = 0, frameCount = 0, lastFpsUpdate = performance.now();
  let stream = null;

  // FPS Counter
  function updateFPS() {
    frameCount++;
    const now = performance.now();
    if (now - lastFpsUpdate >= 200) {
      fps = Math.round(frameCount * 1000 / (now - lastFpsUpdate));
      fpsEl.textContent = fps;
      frameCount = 0;
      lastFpsUpdate = now;
    }
  }

  // Draw nails on canvas
  function drawNails(nails) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (!nails || nails.length === 0) {
      nailCountEl.textContent = '0';
      angleEl.textContent = '--';
      return;
    }
    
    nailCountEl.textContent = nails.length;
    
    // Display first nail angle
    if (nails[0]) {
      const angleDeg = (nails[0].angle * 180 / Math.PI).toFixed(1);
      angleEl.textContent = `${angleDeg}°`;
    }
    
    // Draw each nail
    for (const nail of nails) {
      const { center, width, length, angle, confidence } = nail;
      
      ctx.save();
      ctx.translate(center.x, center.y);
      ctx.rotate(angle);
      
      // Nail ellipse
      ctx.beginPath();
      ctx.ellipse(0, 0, width/2, length/2, 0, 0, 2 * Math.PI);
      
      // Color based on confidence
      const hue = confidence * 120; // 0=red, 120=green
      ctx.fillStyle = `hsla(${hue}, 80%, 60%, 0.5)`;
      ctx.fill();
      
      // Border
      ctx.strokeStyle = `hsla(${hue}, 80%, 50%, 1)`;
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Direction line
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -length/2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.stroke();
      
      ctx.restore();
    }
  }

  // Stream callback
  function onNailsDetected(nails) {
    drawNails(nails);
    updateFPS();
  }

  function onStreamError(error) {
    statusEl.textContent = `❌ Error: ${error.message}`;
    console.error('Stream error:', error);
  }

  // Start camera and detection
  startBtn.addEventListener('click', async () => {
    try {
      statusEl.textContent = 'Starting camera...';
      
      // Get camera stream
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user', // Front camera
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });
      
      video.srcObject = stream;
      await video.play();
      
      // Set canvas size
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      
      statusEl.textContent = 'Starting detector...';
      
      // Start detection
      await detector.startStream(video, onNailsDetected, onStreamError);
      
      isRunning = true;
      startBtn.disabled = true;
      stopBtn.disabled = false;
      captureBtn.disabled = false;
      
      statusEl.textContent = '✅ Running! Show your hand.';
      
    } catch (error) {
      statusEl.textContent = `❌ Failed: ${error.message}`;
      console.error('Start error:', error);
    }
  });

  // Stop detection
  stopBtn.addEventListener('click', () => {
    detector.stopStream();
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
      stream = null;
    }
    video.srcObject = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    isRunning = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    captureBtn.disabled = true;
    
    statusEl.textContent = '⏹️ Stopped.';
    nailCountEl.textContent = '--';
    angleEl.textContent = '--';
  });

  // Capture single frame
  captureBtn.addEventListener('click', async () => {
    if (!isRunning) return;
    
    statusEl.textContent = '📸 Capturing...';
    
    try {
      const nails = await detector.detectNails(video);
      drawNails(nails);
      statusEl.textContent = `📸 Captured! Found ${nails.length} nails.`;
      nailCountEl.textContent = nails.length;
      if (nails[0]) {
        const angleDeg = (nails[0].angle * 180 / Math.PI).toFixed(1);
        angleEl.textContent = `${angleDeg}°`;
      }
    } catch (error) {
      statusEl.textContent = `❌ Capture failed: ${error.message}`;
    }
  });
</script>
</body>
</html>
